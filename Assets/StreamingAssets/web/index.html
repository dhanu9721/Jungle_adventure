<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="screen-orientation" content="landscape" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Jungle Adventure</title>
  <script>
    (function () {
      try {
        if (/[?&]unity-webview=1(?:&|$)/.test(location.search || ""))
          document.documentElement.classList.add("unity-webview");
      } catch (_) {}
    })();
  </script>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/screens.css" />
  <link rel="stylesheet" href="css/popups.css" />
</head>
<body>
  <div id="rotateHint" aria-live="polite">
    <div class="rotate-icon" aria-hidden="true">📱</div>
    <p><strong>Rotate to landscape</strong><br>Jungle Adventure is built for wide screens.</p>
  </div>

  <div id="app" class="app">
    <section id="screenMenu" class="screen screen-menu is-active" aria-hidden="false">
      <svg class="sun-rays" viewBox="0 0 700 700" aria-hidden="true">
        <g fill="#fff" opacity="0.5">
          <polygon points="700,0 700,40 80,700 30,700"/>
          <polygon points="700,80 700,110 200,700 130,700"/>
          <polygon points="700,150 700,170 360,700 300,700"/>
          <polygon points="700,210 700,225 480,700 430,700"/>
        </g>
      </svg>
      <svg class="palm-bg" viewBox="0 0 960 240" preserveAspectRatio="none" aria-hidden="true">
        <g fill="#3a6e5b">
          <use href="#palm-silh" x="0" y="80"/>
          <use href="#palm-silh" x="120" y="100"/>
          <use href="#palm-silh" x="220" y="70"/>
          <use href="#palm-silh" x="380" y="90"/>
          <use href="#palm-silh" x="500" y="60"/>
          <use href="#palm-silh" x="620" y="100"/>
          <use href="#palm-silh" x="780" y="80"/>
          <use href="#palm-silh" x="880" y="100"/>
        </g>
      </svg>
      <svg class="tree tree-left" viewBox="0 0 240 360" aria-hidden="true">
        <path d="M 110 360 Q 90 290 130 230 Q 175 170 130 100 Q 100 60 105 20"
              stroke="#7a4a22" stroke-width="14" fill="none" stroke-linecap="round"/>
        <path d="M 110 360 Q 90 290 130 230 Q 175 170 130 100"
              stroke="#5a3a18" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.5"/>
        <circle cx="115" cy="58" r="48" fill="#3e8c50" stroke="#2a1c10" stroke-width="3"/>
        <circle cx="78" cy="38" r="36" fill="#4ea861" stroke="#2a1c10" stroke-width="3"/>
        <circle cx="148" cy="42" r="38" fill="#4ea861" stroke="#2a1c10" stroke-width="3"/>
        <circle cx="100" cy="20" r="30" fill="#5dc878" stroke="#2a1c10" stroke-width="3"/>
        <circle cx="135" cy="22" r="32" fill="#5dc878" stroke="#2a1c10" stroke-width="3"/>
        <circle cx="115" cy="60" r="20" fill="#3e8c50"/>
      </svg>
      <svg class="tree tree-right" viewBox="0 0 240 360" aria-hidden="true">
        <path d="M 110 360 Q 90 290 130 230 Q 175 170 130 100 Q 100 60 105 20"
              stroke="#7a4a22" stroke-width="14" fill="none" stroke-linecap="round"/>
        <path d="M 110 360 Q 90 290 130 230 Q 175 170 130 100"
              stroke="#5a3a18" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.5"/>
        <circle cx="115" cy="58" r="48" fill="#3e8c50" stroke="#2a1c10" stroke-width="3"/>
        <circle cx="78" cy="38" r="36" fill="#4ea861" stroke="#2a1c10" stroke-width="3"/>
        <circle cx="148" cy="42" r="38" fill="#4ea861" stroke="#2a1c10" stroke-width="3"/>
        <circle cx="100" cy="20" r="30" fill="#5dc878" stroke="#2a1c10" stroke-width="3"/>
        <circle cx="135" cy="22" r="32" fill="#5dc878" stroke="#2a1c10" stroke-width="3"/>
        <circle cx="115" cy="60" r="20" fill="#3e8c50"/>
      </svg>

      <div class="menu-title">JUNGLE</div>

      <svg class="menu-character" viewBox="0 0 160 320" aria-hidden="true">
        <defs>
          <linearGradient id="vestGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#8b6239"/>
            <stop offset="100%" stop-color="#5c3d24"/>
          </linearGradient>
        </defs>
        <ellipse cx="80" cy="314" rx="52" ry="6" fill="rgba(0,0,0,0.28)"/>
        <rect x="56" y="218" width="20" height="60" fill="#3a4a6b" stroke="#2a1c10" stroke-width="3"/>
        <rect x="84" y="218" width="20" height="60" fill="#3a4a6b" stroke="#2a1c10" stroke-width="3"/>
        <ellipse cx="66" cy="286" rx="22" ry="11" fill="#1e1410" stroke="#2a1c10" stroke-width="3"/>
        <ellipse cx="94" cy="286" rx="22" ry="11" fill="#1e1410" stroke="#2a1c10" stroke-width="3"/>
        <ellipse cx="66" cy="293" rx="18" ry="3.5" fill="#2a1810"/>
        <ellipse cx="94" cy="293" rx="18" ry="3.5" fill="#2a1810"/>
        <path d="M 40 138 L 120 138 L 122 218 L 38 218 Z" fill="url(#vestGrad)" stroke="#2a1c10" stroke-width="3"/>
        <path d="M 60 138 L 100 138 L 96 168 L 64 168 Z" fill="#d6b480"/>
        <circle cx="80" cy="150" r="2.4" fill="#5c3d24"/>
        <circle cx="80" cy="160" r="2.4" fill="#5c3d24"/>
        <rect x="38" y="198" width="84" height="14" fill="#c0392b" stroke="#2a1c10" stroke-width="2"/>
        <circle cx="52" cy="205" r="3" fill="#a02818"/>
        <path d="M 40 142 L 22 200 L 30 215 L 48 162 Z" fill="#e8b87a" stroke="#2a1c10" stroke-width="3"/>
        <path d="M 120 142 L 138 200 L 130 215 L 112 162 Z" fill="#e8b87a" stroke="#2a1c10" stroke-width="3"/>
        <circle cx="26" cy="210" r="13" fill="#f0c79a" stroke="#2a1c10" stroke-width="3"/>
        <circle cx="134" cy="210" r="13" fill="#f0c79a" stroke="#2a1c10" stroke-width="3"/>
        <rect x="68" y="120" width="24" height="18" fill="#f0c79a" stroke="#2a1c10" stroke-width="3"/>
        <ellipse cx="80" cy="84" rx="42" ry="44" fill="#f0c79a" stroke="#2a1c10" stroke-width="3"/>
        <ellipse cx="40" cy="86" rx="6" ry="10" fill="#f0c79a" stroke="#2a1c10" stroke-width="3"/>
        <ellipse cx="120" cy="86" rx="6" ry="10" fill="#f0c79a" stroke="#2a1c10" stroke-width="3"/>
        <ellipse cx="56" cy="96" rx="7" ry="5" fill="#c08a65" opacity="0.55"/>
        <ellipse cx="104" cy="96" rx="7" ry="5" fill="#c08a65" opacity="0.55"/>
        <path d="M 56 70 Q 66 65 74 70" stroke="#2a1c10" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M 86 70 Q 94 65 104 70" stroke="#2a1c10" stroke-width="3" fill="none" stroke-linecap="round"/>
        <ellipse cx="66" cy="84" rx="9" ry="11" fill="#fff" stroke="#2a1c10" stroke-width="2.5"/>
        <ellipse cx="94" cy="84" rx="9" ry="11" fill="#fff" stroke="#2a1c10" stroke-width="2.5"/>
        <circle cx="68" cy="86" r="4" fill="#1e1410"/>
        <circle cx="96" cy="86" r="4" fill="#1e1410"/>
        <circle cx="69" cy="84" r="1.6" fill="#fff"/>
        <circle cx="97" cy="84" r="1.6" fill="#fff"/>
        <ellipse cx="80" cy="98" rx="5" ry="3" fill="#f0a878" stroke="#2a1c10" stroke-width="2"/>
        <path d="M 70 110 Q 80 118 90 110" stroke="#2a1c10" stroke-width="3" fill="none" stroke-linecap="round"/>
        <ellipse cx="80" cy="48" rx="62" ry="9" fill="#4a3220" stroke="#2a1c10" stroke-width="3"/>
        <path d="M 46 48 Q 46 16, 80 12 Q 114 16, 114 48 Z" fill="#6a4630" stroke="#2a1c10" stroke-width="3"/>
        <path d="M 46 40 Q 80 35, 114 40 L 114 46 Q 80 42, 46 46 Z" fill="#c0392b" stroke="#2a1c10" stroke-width="2"/>
      </svg>

      <div class="grass-tufts" aria-hidden="true"></div>
      <div class="ground" aria-hidden="true"></div>

      <div class="stats-card">
        DONE <b><span id="statCompleted">0</span>/<span id="statTotal">100</span></b>
      </div>

      <button type="button" id="btnMenuSettings" class="pause-icon" aria-label="Settings"><span></span><span></span></button>

      <div class="side-actions">
        <button type="button" class="btn secondary" id="btnPlay">WORLDS</button>
      </div>

      <button type="button" id="btnQuickPlay" class="arrow-btn play-btn" aria-label="Play">→</button>

      <div class="footer-credit">developed by pixelsage games</div>
    </section>

    <section id="screenWorld" class="screen screen-world" aria-hidden="true">
      <svg class="palm-bg" viewBox="0 0 960 220" preserveAspectRatio="none" aria-hidden="true">
        <g fill="#3a6e5b">
          <use href="#palm-silh" x="0" y="80"/>
          <use href="#palm-silh" x="160" y="60"/>
          <use href="#palm-silh" x="320" y="80"/>
          <use href="#palm-silh" x="500" y="50"/>
          <use href="#palm-silh" x="680" y="80"/>
          <use href="#palm-silh" x="840" y="60"/>
        </g>
      </svg>

      <div class="ws-header">
        <button type="button" id="btnWorldBack" class="icon-btn" aria-label="Back">←</button>
        <div class="ws-heading">
          <div class="ws-title" id="worldTitle">WORLD I</div>
          <div class="ws-sub" id="worldSubtitle">Deep Jungle</div>
        </div>
        <button type="button" id="btnWorldSettings" class="pause-icon" aria-label="Settings"><span></span><span></span></button>
      </div>

      <div class="ws-coin"><span id="wsCoinText">WORLD<br><b>I</b></span></div>

      <div class="ws-card" aria-hidden="true">
        <svg viewBox="0 0 100 120">
          <rect width="100" height="120" rx="4" fill="#f5e8d0"/>
          <ellipse cx="50" cy="48" rx="22" ry="24" fill="#f0c79a" stroke="#2a1c10" stroke-width="2"/>
          <ellipse cx="42" cy="48" rx="4" ry="5" fill="#fff" stroke="#2a1c10" stroke-width="1"/>
          <ellipse cx="58" cy="48" rx="4" ry="5" fill="#fff" stroke="#2a1c10" stroke-width="1"/>
          <circle cx="44" cy="49" r="2" fill="#1e1410"/>
          <circle cx="60" cy="49" r="2" fill="#1e1410"/>
          <path d="M 46 58 Q 50 61 54 58" stroke="#2a1c10" stroke-width="1.5" fill="none"/>
          <ellipse cx="50" cy="30" rx="32" ry="5" fill="#4a3220" stroke="#2a1c10" stroke-width="2"/>
          <path d="M 32 30 Q 32 14, 50 12 Q 68 14, 68 30 Z" fill="#6a4630" stroke="#2a1c10" stroke-width="2"/>
          <rect x="32" y="24" width="36" height="4" fill="#c0392b"/>
          <path d="M 30 72 L 70 72 L 72 108 L 28 108 Z" fill="#8b6239" stroke="#2a1c10" stroke-width="2"/>
          <path d="M 40 72 L 60 72 L 58 86 L 42 86 Z" fill="#d6b480"/>
          <rect x="28" y="92" width="44" height="6" fill="#c0392b"/>
          <rect x="34" y="105" width="12" height="10" fill="#3a4a6b"/>
          <rect x="54" y="105" width="12" height="10" fill="#3a4a6b"/>
        </svg>
      </div>

      <div id="ws-map">
        <svg id="wsSvg" viewBox="0 0 800 320" aria-hidden="true"></svg>
      </div>

      <div class="ws-bottom">
        <button type="button" id="wsPrev" class="ws-nav-arrow" aria-label="Previous world">←</button>
        <button type="button" id="wsNext" class="ws-nav-arrow" aria-label="Next world">→</button>
        <button type="button" id="wsPlay" class="arrow-btn" aria-label="Play next level">→</button>
      </div>

      <div class="footer-credit">developed by pixelsage games</div>
    </section>

    <section id="screenLevel" class="screen screen-level" aria-hidden="true">
      <div class="level-fullscreen">
        <div class="level-game-stage">
          <div class="level-game-stage-sizer" aria-hidden="true"></div>
          <canvas id="game" width="960" height="540" aria-label="Game world"></canvas>
          <div class="level-hud-overlay">
            <div class="hud-cluster hud-left">
              <span class="badge" id="gameLevelBadge">🌿 Level 1/30</span>
              <span class="badge">❤️ <span id="gameLives">3</span></span>
              <button type="button" class="badge badge-btn" id="btnGameLevels" title="Choose level">🔢</button>
            </div>
            <div class="hud-cluster hud-right">
              <span class="badge">⏱️ <span id="gameTime">0.0</span>s</span>
              <span class="badge">💎 <span id="gameGems">0</span><span id="gameGemsMax">/0</span></span>
              <button type="button" class="btn btn-icon" id="btnPause" aria-label="Pause">⏸</button>
            </div>
          </div>
        </div>
      </div>
      <button type="button" id="touchToggle" class="touch-toggle" aria-pressed="false">On-screen controls</button>
      <div id="touchLayer" class="touch-layer" aria-hidden="true">
        <div class="touch-left touch-zone">
          <div class="touch-move">
            <div class="touch-pad" data-touch="left" role="button" aria-label="Left">◀</div>
            <div class="touch-pad" data-touch="right" role="button" aria-label="Right">▶</div>
          </div>
          <button
            type="button"
            class="touch-btn touch-run"
            data-touch="run"
            role="switch"
            aria-checked="false"
            aria-label="Fast run (tap to turn on or off)"
          >
            ⚡
          </button>
        </div>
        <div class="touch-actions touch-zone">
          <button type="button" class="touch-btn touch-climb" data-touch="up" aria-label="Climb up">▲</button>
          <button type="button" class="touch-btn touch-jump" data-touch="jump" aria-label="Jump">Jump</button>
          <button type="button" class="touch-btn touch-climb" data-touch="down" aria-label="Climb down">▼</button>
        </div>
      </div>
    </section>
  </div>

  <div id="popupSettings" class="popup" aria-hidden="true" role="dialog" aria-labelledby="settingsTitle">
    <div class="popup-backdrop" data-close="settings"></div>
    <div class="popup-panel">
      <h2 id="settingsTitle" class="popup-title">Settings</h2>
      <label class="setting-row"><span>Sound</span><input type="checkbox" id="settingSound" checked /></label>
      <label class="setting-row"><span>Music</span><input type="checkbox" id="settingMusic" checked /></label>
      <p class="popup-note">Saved on this device.</p>
      <button type="button" class="btn btn-primary btn-block" data-close="settings">Close</button>
    </div>
  </div>

  <div id="popupPause" class="popup" aria-hidden="true" role="dialog" aria-labelledby="pauseTitle">
    <div class="popup-backdrop" data-close="pause-resume"></div>
    <div class="popup-panel">
      <h2 id="pauseTitle" class="popup-title">Paused</h2>
      <p class="popup-sub">Your run is on hold.</p>
      <div class="popup-actions stack">
        <button type="button" class="btn btn-primary btn-block" id="btnResume">Resume</button>
        <button type="button" class="btn btn-secondary btn-block" id="btnPauseLevels">Choose level</button>
        <button type="button" class="btn btn-ghost btn-block" id="btnPauseMenu">Main menu</button>
      </div>
    </div>
  </div>

  <div id="popupGameEnd" class="popup" aria-hidden="true" role="dialog" aria-labelledby="gameEndTitle">
    <div class="popup-backdrop" data-game-end-backdrop></div>
    <div class="popup-panel">
      <h2 id="gameEndTitle" class="popup-title"></h2>
      <p id="gameEndText" class="popup-sub"></p>
      <div class="popup-actions stack" id="gameEndActions"></div>
    </div>
  </div>

  <svg style="position:absolute; width:0; height:0;" aria-hidden="true">
    <defs>
      <g id="palm-silh">
        <path d="M 50 160 Q 45 130 55 100 Q 65 70 60 30 L 65 30 Q 70 70 60 100 Q 50 130 60 160 Z"/>
        <ellipse cx="62" cy="22" rx="28" ry="14"/>
        <ellipse cx="40" cy="30" rx="22" ry="12"/>
        <ellipse cx="84" cy="30" rx="22" ry="12"/>
        <ellipse cx="48" cy="6" rx="22" ry="12"/>
        <ellipse cx="76" cy="6" rx="22" ry="12"/>
      </g>
    </defs>
  </svg>

  <script src="js/storage.js"></script>
  <script src="js/world-levels.js"></script>
  <script src="js/bg-art.js"></script>
  <script src="js/game.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
